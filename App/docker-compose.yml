version: "3.9"

services:
  #db:
   # image: postgres:16
   # container_name: banco_db
   # restart: unless-stopped
    #environment:
     # POSTGRES_DB: banco_db
     # POSTGRES_USER: banco_user
      #POSTGRES_PASSWORD: banco_password
    #ports:
    #  - "5432:5432"
   # volumes:
   #   - pgdata:/var/lib/postgresql/data

  fastapi:
    build: ./fastapi_app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    container_name: banco_fastapi
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # ── Elige el proveedor de BD cambiando DB_PROVIDER ─────────────
      # "postgres"  → PostgreSQL local (descomentar bloque #db arriba)
      # "supabase"  → Supabase remoto con SSL (credenciales en .env)
      # "memory"    → SQLite en RAM (sin BD, solo para pruebas rápidas)
      DB_PROVIDER: postgres      # ← CAMBIAR AQUÍ

      # ── Variables para DB_PROVIDER=postgres ────────────────────────
      #DB_USER: banco_user
      #DB_PASSWORD: banco_password
      #DB_HOST: db
      #DB_PORT: 5432
      #DB_NAME: banco_db
      #DB_SSLMODE: "disable"

      # ── Variables para DB_PROVIDER=supabase ────────────────────────
      # (o poner DATABASE_URL completa en el .env)
      #DB_USER: postgres.xxxxxxxxxxxx
      #DB_PASSWORD: tu_password_supabase
      #DB_HOST: aws-0-us-east-1.pooler.supabase.com
      #DB_PORT: 6543
      #DB_NAME: postgres

      LOGIN_EVENTS_SECRET: "Super_secret"
      SERVICE_NAME: "bankservice"
      ENVIRONMENT: "dev"
      LOGIN_EVENTS_TIMEOUT: "2.5"
   # depends_on:
    #  - db
    ports:
      - "8000:8000"

  flask:
    build: ./flask_app
    container_name: banco_flask
    restart: unless-stopped
    environment:
      FASTAPI_BASE_URL: http://banco_fastapi:8000
    depends_on:
      - fastapi
    ports:
      - "80:5000"
    command: python app.py
#volumes:
 # pgdata: